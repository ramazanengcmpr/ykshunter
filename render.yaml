services:
  - type: web
    name: ykshunter-api
    env: php
    buildCommand: composer install --no-dev --optimize-autoloader 2>/dev/null || true
    startCommand: php -S 0.0.0.0:$PORT -t /var/www/html
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ykshunter-db
          property: connectionString

databases:
  - name: ykshunter-db
    databaseName: ykshunter
    plan: free
